<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — bAsKaR.</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── matches index.html palette ── */
    :root {
      --bg: #fffbea;
      --bg2: #fff8d6;
      --bg3: #fdf3c0;
      --glass: rgba(255, 251, 220, 0.82);
      --glass-b: rgba(0, 100, 160, 0.14);
      --teal: #0077a8;
      --teal2: #009dc4;
      --text: #0d1f3c;
      --muted: #3a5275;
      --dim: #7a95b8;
      --grad: linear-gradient(135deg, #0077a8, #009dc4);
      --red: #dc2626;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      font-size: 16px
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0, 119, 168, .07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 157, 196, .05) 0%, transparent 60%);
      color: var(--text);
      padding: 1.5rem;
    }

    a {
      text-decoration: none;
      color: inherit
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none
    }

    input {
      font-family: inherit
    }

    ::selection {
      background: rgba(0, 119, 168, .2);
      color: var(--text)
    }

    .login-wrap {
      width: 100%;
      max-width: 420px
    }

    .login-card {
      background: rgba(255, 251, 220, .9);
      backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--glass-b);
      border-radius: 22px;
      padding: 2.5rem 2rem;
      box-shadow: 0 16px 56px rgba(0, 30, 80, .12), 0 1px 0 rgba(255, 255, 255, .8) inset;
    }

    .login-logo {
      font-size: 2rem;
      font-weight: 900;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -.03em;
      display: block;
      text-align: center;
      margin-bottom: .25rem;
    }

    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: .82rem;
      margin-bottom: 2rem
    }

    .login-title {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text);
      text-align: center;
      margin-bottom: 1.75rem
    }

    .lf {
      margin-bottom: 1.2rem
    }

    .lf label {
      display: block;
      font-size: .71rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }

    .lf input {
      width: 100%;
      padding: .85rem 1rem;
      background: #fff;
      border: 1.5px solid rgba(0, 100, 160, .16);
      border-radius: 12px;
      color: var(--text);
      font-size: .93rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }

    .lf input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0, 119, 168, .1);
    }

    .lf input::placeholder {
      color: var(--dim)
    }

    .login-btn {
      width: 100%;
      padding: .9rem;
      margin-top: .5rem;
      background: var(--grad);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      font-family: inherit;
      cursor: pointer;
      transition: all .22s;
      box-shadow: 0 4px 18px rgba(0, 119, 168, .28);
    }

    .login-btn:hover {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 119, 168, .35)
    }

    .login-btn:active {
      transform: translateY(0)
    }

    .login-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none
    }

    .login-err {
      margin-top: 1rem;
      padding: .72rem 1rem;
      background: rgba(220, 38, 38, .08);
      border: 1px solid rgba(220, 38, 38, .22);
      border-radius: 10px;
      color: var(--red);
      font-size: .82rem;
      text-align: center;
      display: none;
    }

    .login-back {
      text-align: center;
      margin-top: 1.4rem
    }

    .login-back a {
      color: var(--teal);
      font-size: .83rem;
      font-weight: 500;
      transition: opacity .2s
    }

    .login-back a:hover {
      opacity: .75
    }

    .glow-bg {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 0
    }

    .glow-bg.g1 {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(0, 119, 168, .07) 0%, transparent 70%);
      top: -80px;
      right: -80px
    }

    .glow-bg.g2 {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(0, 100, 150, .05) 0%, transparent 70%);
      bottom: -60px;
      left: -60px
    }

    @media(max-width:480px) {
      .login-card {
        padding: 1.75rem 1.35rem;
        border-radius: 18px
      }

      .login-logo {
        font-size: 1.65rem
      }
    }
  </style>
</head>

<body>
  <div class="glow-bg g1"></div>
  <div class="glow-bg g2"></div>
  <div class="login-wrap" style="position:relative;z-index:1">
    <div class="login-card">
      <span class="login-logo">bAsKaR<span>.</span></span>
      <p class="login-sub">Portfolio Admin Panel</p>
      <h1 class="login-title">Sign In</h1>
      <div class="lf">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email" />
      </div>
      <div class="lf">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="login-btn" id="loginBtn">Sign In →</button>
      <div class="login-err" id="loginErr"></div>
    </div>
    <div class="login-back"><a href="index.html">← Back to Portfolio</a></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCuppeRmubP-wmggKGQHohkIpUMfJrSIEw",
      authDomain: "baskar-portfolio-01.firebaseapp.com",
      projectId: "baskar-portfolio-01",
      storageBucket: "baskar-portfolio-01.firebasestorage.app",
      messagingSenderId: "419892432323",
      appId: "1:419892432323:web:c185c92ddc458427c10176"
    };


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already logged in, redirect
    onAuthStateChanged(auth, user => {
      if (user) window.location.replace('admin.html');
    });

    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('loginEmail');
    const pass = document.getElementById('loginPass');
    const err = document.getElementById('loginErr');

    function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }
    function hideErr() { err.style.display = 'none'; }

    async function doLogin() {
      hideErr();
      const e = email.value.trim();
      const p = pass.value;
      if (!e || !p) { showErr('Please enter email and password.'); return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        await signInWithEmailAndPassword(auth, e, p);
        window.location.replace('admin.html');
      } catch (ex) {
        const msgs = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password.',
          'auth/invalid-email': 'Invalid email address.',
          'auth/too-many-requests': 'Too many attempts. Try again later.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        showErr(msgs[ex.code] || 'Login failed. Check credentials.');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In →';
      }
    }

    btn.addEventListener('click', doLogin);
    [email, pass].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
  </script>
</body>

</html>
